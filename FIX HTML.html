    let currentCategory = '';

    function showHome() {
      document.getElementById('home-view').classList.add('active');
      document.getElementById('dynamic-view').classList.remove('active');
      document.getElementById('back-btn').classList.add('hidden');
      document.getElementById('search-bar').classList.add('hidden');
      document.getElementById('search-input').value = '';
      currentCategory = '';
    }

    function showCategory(cat) {
      currentCategory = cat;
      document.getElementById('home-view').classList.remove('active');
      document.getElementById('dynamic-view').classList.add('active');
      document.getElementById('back-btn').classList.remove('hidden');
      
      renderPlaces(cat);
    }

    function renderPlaces(filterCat, searchKeyword = '') {
      const container = document.getElementById('cards-container');
      container.innerHTML = '';

      const filtered = tempatData.filter(item => {
        const matchCategory = filterCat ? (item.category === filterCat) : true;
        const matchSearch = item.name.toLowerCase().includes(searchKeyword.toLowerCase()) || 
                            item.desc.toLowerCase().includes(searchKeyword.toLowerCase());
        return matchCategory && matchSearch;
      });

      if(filtered.length === 0) {
        container.innerHTML = `<div class="text-center py-12 text-gray-400 text-sm font-medium col-span-full">Tempat tidak ditemukan...</div>`;
        return;
      }

      filtered.forEach(item => {
        // Jika kordinat ada, link-kan ke Google Maps
        const mapLink = (item.lat && item.lng) 
          ? `https://maps.google.com/?q=${item.lat},${item.lng}` 
          : `https://maps.google.com/?q=Kayutangan+Malang`;

        const jamOperasionalHTML = item.jam 
          ? `<div class="flex items-center gap-1.5 text-xs font-semibold text-amber-800 bg-amber-50 border border-amber-100 rounded-lg px-2 py-1 w-max mt-3">
               <span>🕒 Jam: ${item.jam}</span>
             </div>` 
          : '';

        const imageHTML = item.image 
          ? `<div class="w-full h-44 bg-gray-100 border-b border-gray-100 overflow-hidden">
               <img src="${item.image}" alt="${item.name}" class="w-full h-full object-cover">
             </div>` 
          : '';
          
        const descHTML = item.desc 
          ? `<p class="text-xs mt-2 text-gray-500 leading-relaxed font-medium">${item.desc}</p>`
          : '';

        const card = document.createElement('div');
        card.className = "card-item bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-100/80 flex flex-col justify-between";
        card.innerHTML = `
          ${imageHTML}
          <div class="p-5 flex-1 flex flex-col justify-between">
            <div>
              <div class="flex items-start justify-between gap-2">
                <h4 class="font-bold text-gray-800 text-base leading-snug">${item.name}</h4>
                <span class="text-[10px] px-2 py-0.5 bg-gray-50 border border-gray-200 text-gray-500 rounded-md uppercase font-bold tracking-wider shrink-0">${item.category}</span>
              </div>
              ${descHTML}
              ${jamOperasionalHTML}
            </div>
            <div class="mt-5 pt-4 border-t border-gray-100 flex justify-between items-center">
              <span class="text-[11px] text-gray-400 font-mono tracking-tight">${item.lat ? item.lat.substring(0, 8)+'...' : 'No Coord'}</span>
              <a class="inline-flex items-center gap-1.5 text-xs font-bold transition-all hover:opacity-80 px-3 py-1.5 rounded-lg bg-gray-50 border border-gray-100" 
                 href="${mapLink}" 
                 target="_blank" 
                 rel="noopener noreferrer" 
                 style="color: rgb(139, 94, 60);">
                 📍 Buka Lokasi
              </a>
            </div>
          </div>
        `;
        container.appendChild(card);
      });
    }

    function toggleSearch() {
      document.getElementById('search-bar').classList.toggle('hidden');
      document.getElementById('search-input').focus();
    }

    function filterCards() {
      const q = document.getElementById('search-input').value;
      if (currentCategory === '') {
        document.getElementById('home-view').classList.remove('active');
        document.getElementById('dynamic-view').classList.add('active');
        document.getElementById('back-btn').classList.remove('hidden');
      }
      renderPlaces(currentCategory, q);
    }
  </script>
